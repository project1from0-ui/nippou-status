<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>Nippou Automation Status</title>
<style>
:root {
  --bg: #f7f7f9;
  --card: #ffffff;
  --text: #1a1a1a;
  --muted: #6b7280;
  --subtle-bg: #f3f4f6;
  --border: #e5e7eb;
  --ok: #16a34a;
  --skip: #9ca3af;
  --err: #dc2626;
  --accent: #2563eb;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f1115;
    --card: #171a21;
    --text: #f3f4f6;
    --muted: #9ca3af;
    --subtle-bg: #1f232c;
    --border: #252932;
    --ok: #22c55e;
    --skip: #6b7280;
    --err: #ef4444;
    --accent: #60a5fa;
  }
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Helvetica Neue", Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}
.wrap {
  max-width: 760px;
  margin: 0 auto;
  padding: 24px 16px 80px;
}
h1 {
  font-size: 20px;
  margin: 0 0 16px;
  letter-spacing: 0.02em;
}
h2 {
  font-size: 14px;
  margin: 0 0 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
}
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
}
details.card > summary {
  cursor: pointer;
  list-style: none;
  font-weight: 700;
  font-size: 15px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
details.card > summary::-webkit-details-marker { display: none; }
details.card > summary::after {
  content: "▾";
  color: var(--muted);
  transition: transform 0.2s;
}
details.card[open] > summary::after { transform: rotate(180deg); }
details.card[open] > summary { margin-bottom: 12px; }
.headline {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}
.badge {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
  line-height: 1;
  color: #fff;
}
.badge.ok { background: var(--ok); }
.badge.skip { background: var(--skip); }
.badge.err { background: var(--err); }
.meta {
  color: var(--muted);
  font-size: 13px;
  margin-top: 4px;
}
.big {
  font-size: 32px;
  font-weight: 700;
  margin: 6px 0;
}
.subtle {
  color: var(--muted);
  font-size: 13px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(44px, 1fr));
  gap: 8px;
  margin-top: 8px;
}
.day {
  aspect-ratio: 1 / 1;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 600;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--muted);
}
.day.success, .day.ok { background: var(--ok); color: #fff; border-color: transparent; }
.day.skipped, .day.skip { background: var(--skip); color: #fff; border-color: transparent; opacity: 0.6; }
.day.failure, .day.err { background: var(--err); color: #fff; border-color: transparent; }
.day.future { opacity: 0.25; }
.history-list {
  list-style: none;
  padding: 0;
  margin: 0;
}
.history-list li {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
  gap: 12px;
}
.history-list li:last-child { border-bottom: none; }
.history-list .date { font-variant-numeric: tabular-nums; }
.history-list .reason {
  color: var(--muted);
  font-size: 12px;
}
.dot {
  width: 10px;
  height: 10px;
  border-radius: 999px;
  display: inline-block;
  margin-right: 8px;
  vertical-align: middle;
}
.dot.success { background: var(--ok); }
.dot.skipped { background: var(--skip); }
.dot.failure { background: var(--err); }
footer {
  margin-top: 24px;
  color: var(--muted);
  font-size: 12px;
  text-align: center;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
.loading { text-align: center; color: var(--muted); padding: 24px; }
.err-msg { color: var(--err); padding: 16px; text-align: center; }
.kv {
  display: grid;
  grid-template-columns: 140px 1fr;
  gap: 8px 12px;
  font-size: 13px;
  margin: 8px 0;
}
.kv dt { color: var(--muted); }
.kv dd { margin: 0; word-break: break-all; }
.flow-list {
  list-style: none;
  padding: 0;
  margin: 0;
  counter-reset: step;
}
.flow-list li {
  position: relative;
  padding: 8px 0 8px 34px;
  font-size: 13px;
  line-height: 1.5;
  border-bottom: 1px dashed var(--border);
}
.flow-list li:last-child { border-bottom: none; }
.flow-list li::before {
  counter-increment: step;
  content: counter(step);
  position: absolute;
  left: 0;
  top: 8px;
  width: 22px;
  height: 22px;
  border-radius: 999px;
  background: var(--accent);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
}
.file-list {
  list-style: none;
  padding: 0;
  margin: 0;
}
.file-list li {
  padding: 8px 0;
  border-bottom: 1px dashed var(--border);
  font-size: 13px;
}
.file-list li:last-child { border-bottom: none; }
.file-list .path {
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  font-weight: 600;
  font-size: 12px;
}
.file-list .desc {
  color: var(--muted);
  font-size: 12px;
  margin-top: 2px;
  line-height: 1.5;
}
.file-list .size {
  color: var(--muted);
  font-size: 11px;
  float: right;
}
.commit-list { list-style: none; padding: 0; margin: 0; }
.commit-list li {
  padding: 8px 0;
  border-bottom: 1px dashed var(--border);
  font-size: 12px;
  display: grid;
  grid-template-columns: 64px 1fr auto;
  gap: 8px;
  align-items: baseline;
}
.commit-list li:last-child { border-bottom: none; }
.commit-list .sha {
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  color: var(--accent);
}
.commit-list .msg { word-break: break-word; }
.commit-list .when { color: var(--muted); font-size: 11px; white-space: nowrap; }
.chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 11px;
  background: var(--subtle-bg);
  color: var(--muted);
  margin: 2px 4px 2px 0;
}
.tagline { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
.cmd-list { list-style: none; padding: 0; margin: 0; }
.cmd-list li {
  padding: 12px 0;
  border-bottom: 1px dashed var(--border);
}
.cmd-list li:last-child { border-bottom: none; }
.cmd-category {
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 3px;
  color: var(--text);
}
.cmd-desc {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 6px;
  line-height: 1.45;
}
.copy-cmd {
  display: block;
  background: var(--subtle-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 70px 10px 12px;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  font-size: 12px;
  cursor: pointer;
  word-break: break-all;
  position: relative;
  transition: background 0.15s;
  white-space: pre-wrap;
  line-height: 1.5;
  color: var(--text);
}
.copy-cmd:hover { background: var(--border); }
.copy-cmd::after {
  content: "タップでコピー";
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 10px;
  color: var(--muted);
  background: var(--card);
  padding: 3px 8px;
  border-radius: 4px;
  border: 1px solid var(--border);
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
}
.copy-cmd.copied::after {
  content: "✓ コピー済み";
  color: #fff;
  background: var(--ok);
  border-color: transparent;
}
.cmd-sub-header {
  margin: 12px 0 6px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
}
</style>
</head>
<body>
<div class="wrap">
  <h1>📋 Nippou Automation Status</h1>
  <div id="tagline" class="tagline"></div>
  <div id="status-area">
    <div class="loading">読み込み中…</div>
  </div>
  <div id="system-area"></div>
</div>

<script>
const STATUS_URL = "./status.json?t=" + Date.now();
const SYSTEM_URL = "./system.json?t=" + Date.now();

function fmtDate(iso, tz = "Asia/Tokyo") {
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  return new Intl.DateTimeFormat("ja-JP", {
    timeZone: tz,
    year: "numeric", month: "2-digit", day: "2-digit",
    hour: "2-digit", minute: "2-digit",
    hour12: false,
  }).format(d);
}

function shortDate(iso) {
  return iso.slice(5).replace("-", "/");
}

function badgeFor(status) {
  if (status === "success") return `<span class="badge ok">成功</span>`;
  if (status === "skipped") return `<span class="badge skip">スキップ</span>`;
  if (status === "failure") return `<span class="badge err">失敗</span>`;
  return `<span class="badge skip">データなし</span>`;
}

function dotFor(status) {
  return `<span class="dot ${status}"></span>`;
}

function calcStreak(history) {
  let streak = 0;
  for (const entry of history) {
    if (entry.status === "success") streak++;
    else if (entry.status === "skipped") continue;
    else break;
  }
  return streak;
}

function computeCalendar(history) {
  const map = new Map();
  for (const e of history) map.set(e.date, e.status);
  const today = new Date();
  const tzJst = new Intl.DateTimeFormat("en-CA", { timeZone: "Asia/Tokyo", year: "numeric", month: "2-digit", day: "2-digit" });
  const parts = tzJst.formatToParts(today);
  const y = parts.find(p => p.type === "year").value;
  const m = parts.find(p => p.type === "month").value;
  const d = parts.find(p => p.type === "day").value;
  const todayJst = new Date(`${y}-${m}-${d}T00:00:00+09:00`);
  const cells = [];
  for (let i = 29; i >= 0; i--) {
    const dt = new Date(todayJst.getTime() - i * 86400000);
    const dateStr = tzJst.format(dt);
    const status = map.get(dateStr);
    cells.push({ date: dateStr, status });
  }
  return cells;
}

function escapeHtml(s) {
  if (s == null) return "";
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

function copyCmd(el) {
  const text = el.dataset.cmd || el.textContent.trim();
  const done = () => {
    el.classList.add("copied");
    setTimeout(() => el.classList.remove("copied"), 1500);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done, () => fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}
function fallbackCopy(text, done) {
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand("copy"); done(); } catch (_) {}
  document.body.removeChild(ta);
}
window.copyCmd = copyCmd;

function renderStatus(data) {
  const history = (data.history || []).slice().sort((a, b) => (a.date < b.date ? 1 : -1));
  const last = data.last_run || history[0] || null;
  const streak = calcStreak(history);
  const calendar = computeCalendar(history);

  const lastBadge = last ? badgeFor(last.status) : badgeFor(null);
  const lastTime = last && last.timestamp ? fmtDate(last.timestamp) : "—";
  const lastReason = last && last.reason ? `<div class="meta">${escapeHtml(last.reason)}</div>` : "";

  return `
    <div class="card">
      <div class="headline">
        <div>
          <div class="subtle">最終実行</div>
          <div class="big">${lastTime}</div>
          ${lastBadge}
          ${lastReason}
        </div>
        <div style="text-align: right;">
          <div class="subtle">連続成功</div>
          <div class="big">${streak}<span class="subtle" style="font-size:14px;"> 日</span></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="subtle">直近30日</div>
      <div class="grid">
        ${calendar.map(c => {
          const cls = c.status || "future";
          return `<div class="day ${cls}" title="${c.date}${c.status ? ': ' + c.status : ''}">${shortDate(c.date)}</div>`;
        }).join("")}
      </div>
    </div>

    <div class="card">
      <div class="subtle">履歴</div>
      <ul class="history-list">
        ${history.length === 0 ? '<li><span class="reason">まだ実行履歴がありません</span></li>' :
          history.slice(0, 30).map(h => `
            <li>
              <span class="date">${dotFor(h.status)}${h.date}</span>
              <span class="reason">${escapeHtml(h.reason || h.status || "")}</span>
            </li>
          `).join("")}
      </ul>
    </div>
  `;
}

function renderSystem(sys) {
  if (!sys) return "";
  const arch = sys.architecture || {};
  const sched = sys.schedule || {};
  const target = sys.target || {};
  const files = sys.scripts || [];
  const commits = sys.recent_commits || [];
  const flow = sys.data_flow || [];
  const secrets = sys.secrets || [];
  const wfs = sys.workflows || [];
  const panel = sys.control_panel || {};
  const git = sys.git || {};

  const archHtml = `
    <dl class="kv">
      <dt>Private repo</dt>
      <dd><a href="${escapeHtml(arch.private_repo?.url || '#')}" target="_blank">${escapeHtml(arch.private_repo?.name || '')}</a><div class="subtle">${escapeHtml(arch.private_repo?.role || '')}</div></dd>
      <dt>Public repo</dt>
      <dd><a href="${escapeHtml(arch.public_repo?.url || '#')}" target="_blank">${escapeHtml(arch.public_repo?.name || '')}</a><div class="subtle">${escapeHtml(arch.public_repo?.role || '')}</div></dd>
      <dt>Dashboard</dt>
      <dd><a href="${escapeHtml(arch.public_repo?.pages_url || '#')}">${escapeHtml(arch.public_repo?.pages_url || '')}</a></dd>
    </dl>`;

  const targetHtml = `
    <dl class="kv">
      <dt>対象学生</dt><dd><strong>${escapeHtml(target.student_name || '')}</strong></dd>
      <dt>フォーム</dt><dd>${escapeHtml(target.form_title || '')}</dd>
      <dt>URL</dt><dd style="font-size:11px;"><a href="${escapeHtml(target.form_url || '#')}" target="_blank">${escapeHtml((target.form_url || '').slice(0, 80))}…</a></dd>
      <dt>安全装置</dt><dd class="subtle">${escapeHtml(target.safety || '')}</dd>
    </dl>`;

  const schedHtml = `
    <dl class="kv">
      <dt>cron</dt><dd><code>${escapeHtml(sched.cron || '')}</code></dd>
      <dt>実行時刻</dt><dd>${escapeHtml(sched.description || '')}</dd>
      <dt>ジッター</dt><dd>${escapeHtml(sched.jitter || '')}</dd>
      <dt>実効範囲</dt><dd>${escapeHtml(sched.effective_window || '')}</dd>
    </dl>`;

  const filesHtml = files.map(f => `
    <li>
      <span class="size">${f.lines}行 / ${Math.round((f.size_bytes || 0)/102.4)/10}KB</span>
      <div class="path">${escapeHtml(f.path)}</div>
      <div class="desc">${escapeHtml(f.description || '')}</div>
    </li>`).join("");

  const wfHtml = wfs.map(w => `
    <li>
      <div class="path">${escapeHtml(w.file)}</div>
      <div class="desc">${escapeHtml(w.name)} ${(w.triggers || []).map(t => `<span class="chip">${escapeHtml(t)}</span>`).join("")}</div>
    </li>`).join("");

  const commitsHtml = commits.map(c => `
    <li>
      <span class="sha">${escapeHtml(c.sha)}</span>
      <span class="msg">${escapeHtml(c.message)}</span>
      <span class="when">${fmtDate(c.date)}</span>
    </li>`).join("");

  const flowHtml = flow.map(step => `<li>${escapeHtml(step)}</li>`).join("");

  const secretsHtml = secrets.map(s => `
    <li>
      <div class="path">${escapeHtml(s.name)}</div>
      <div class="desc">${escapeHtml(s.purpose || '')}</div>
    </li>`).join("");

  const subCmds = panel.subcommands || [];
  const examples = panel.examples || [];
  const oneOffs = sys.one_off_commands || [];

  const subCmdsHtml = subCmds.map(s => `
    <li>
      <div class="cmd-category">${escapeHtml(s.name)}</div>
      <div class="cmd-desc">${escapeHtml(s.description || "")}</div>
      <code class="copy-cmd" data-cmd="${escapeHtml(s.command)}" onclick="copyCmd(this)">${escapeHtml(s.command)}</code>
    </li>`).join("");

  const oneOffsHtml = oneOffs.map(o => `
    <li>
      <div class="cmd-category">${escapeHtml(o.category)}</div>
      <div class="cmd-desc">${escapeHtml(o.description || "")}</div>
      <code class="copy-cmd" data-cmd="${escapeHtml(o.command)}" onclick="copyCmd(this)">${escapeHtml(o.command)}</code>
    </li>`).join("");

  return `
    <h2 style="margin-top:24px;">システム詳細 (自動同期)</h2>
    <details class="card" open>
      <summary>アーキテクチャ</summary>
      ${archHtml}
    </details>
    <details class="card">
      <summary>対象・安全装置</summary>
      ${targetHtml}
    </details>
    <details class="card">
      <summary>スケジュール</summary>
      ${schedHtml}
    </details>
    <details class="card">
      <summary>データフロー（1日の流れ）</summary>
      <ol class="flow-list">${flowHtml}</ol>
    </details>
    <details class="card">
      <summary>スクリプト (${files.length})</summary>
      <ul class="file-list">${filesHtml}</ul>
    </details>
    <details class="card">
      <summary>ワークフロー (${wfs.length})</summary>
      <ul class="file-list">${wfHtml}</ul>
    </details>
    <details class="card">
      <summary>シークレット (${secrets.length})</summary>
      <ul class="file-list">${secretsHtml}</ul>
    </details>
    <details class="card" open>
      <summary>コマンド集（タップでコピー）</summary>
      <div class="subtle">${escapeHtml(panel.description || '')}</div>
      <div style="margin:8px 0; font-family: ui-monospace, monospace; font-size: 12px; color: var(--muted);">場所: ${escapeHtml(panel.location || '')}</div>
      <div class="cmd-sub-header">./nippou サブコマンド (${subCmds.length})</div>
      <ul class="cmd-list">${subCmdsHtml}</ul>
      <div class="cmd-sub-header">単発コマンド (${oneOffs.length})</div>
      <ul class="cmd-list">${oneOffsHtml}</ul>
    </details>
    <details class="card">
      <summary>最近のコミット (${commits.length})</summary>
      <ul class="commit-list">${commitsHtml}</ul>
      <div class="subtle" style="margin-top:8px;">HEAD: <code>${escapeHtml(git.head_sha || '')}</code> on <code>${escapeHtml(git.current_branch || '')}</code></div>
    </details>
  `;
}

async function load() {
  const statusArea = document.getElementById("status-area");
  const systemArea = document.getElementById("system-area");
  const tagline = document.getElementById("tagline");

  // Status (required)
  let status;
  try {
    const res = await fetch(STATUS_URL, { cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    status = await res.json();
  } catch (e) {
    statusArea.innerHTML = `<div class="err-msg">status.json読み込み失敗: ${escapeHtml(e.message)}</div>`;
    return;
  }
  statusArea.innerHTML = renderStatus(status);

  // System (optional — may not exist yet)
  try {
    const res = await fetch(SYSTEM_URL, { cache: "no-store" });
    if (res.ok) {
      const sys = await res.json();
      if (sys.tagline) tagline.textContent = sys.tagline;
      systemArea.innerHTML = renderSystem(sys);
    }
  } catch (e) {
    // system.json optional; silently ignore
  }
}

load();
setInterval(load, 120000);
</script>
<footer>
  <span id="now"></span>
  <script>
    document.getElementById("now").textContent = "最後の更新: " + new Intl.DateTimeFormat("ja-JP",
      { timeZone: "Asia/Tokyo", hour: "2-digit", minute: "2-digit" }).format(new Date());
  </script>
</footer>
</body>
</html>
